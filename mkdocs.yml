site_name: Everything About Agent
site_description: Agent 设计模式学习课程 - 21个核心设计模式详解
site_url: https://example.com/

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

nav:
  - 🏠 首页: index.md
  - 📚 基础概念:
    - 🤖 什么是 AI Agent?: practices/Agent_design/chapter0_what_is_agent/index.md
  - 📖 基础模式:
    - 🔗 Chaining (提示链): practices/Agent_design/chapter1_chaining/index.md
    - 🔀 Routing (路由模式): practices/Agent_design/chapter2_routing/index.md
    - ⚡ Parallelization (并行化): practices/Agent_design/chapter3_parallelization/index.md
    - 🔄 Reflection (反思模式): practices/Agent_design/chapter4_reflection/index.md
  - 🚀 进阶模式:
    - 🛠️ Tool Use (工具使用): practices/Agent_design/chapter5_tool_use/index.md
    - 📋 Planning (规划模式): practices/Agent_design/chapter6_planning/index.md
    - 👥 Multi-Agent (多Agent协作): practices/Agent_design/chapter7_multi_agent/index.md
    - 💾 Memory (记忆管理): practices/Agent_design/chapter8_memory/index.md
    - 📚 Learning (学习与适应): practices/Agent_design/chapter9_learning/index.md
    - 🔌 MCP (模型上下文协议): practices/Agent_design/chapter10_mcp/index.md
    - 🎯 Goal Setting (目标设定): practices/Agent_design/chapter11_goal_setting/index.md
    - ⚠️ Exception Handling (异常处理): practices/Agent_design/chapter12_exception_handling/index.md
    - 👤 Human-in-Loop (人机协作): practices/Agent_design/chapter13_human_in_loop/index.md
    - 📚 RAG (检索增强生成): practices/Agent_design/chapter14_rag/index.md
    - 🔗 A2A (Agent间通信): practices/Agent_design/chapter15_a2a/index.md
  - 🧠 高级模式:
    - 🧩 Reasoning (推理技术): practices/Agent_design/chapter17_reasoning/index.md
    - 🛡️ Guardrails (护栏与安全): practices/Agent_design/chapter18_guardrails/index.md
    - 📊 Evaluation (评估与监控): practices/Agent_design/chapter19_evaluation/index.md
    - ⭐ Prioritization (优先级管理): practices/Agent_design/chapter20_prioritization/index.md
    - 🔍 Exploration (探索与发现): practices/Agent_design/chapter21_exploration/index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - mermaid2:
      version: '10.9.0'
      javascript: https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js
      arguments:
        theme: default
        flowchart:
          curve: basis

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-repo/everything_about_agent

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js
  - js/mermaid-init.js
